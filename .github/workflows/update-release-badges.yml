name: Update release badges

on:
  workflow_dispatch:
  schedule:
    - cron: "17 */6 * * *"

permissions:
  contents: write

jobs:
  update-release-badges:
    runs-on: ubuntu-latest

    steps:
      - name: Check out badge repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Generate release badge JSON
        run: python3 scripts/update_release_badges.py
        env:
          ROADMAP_BADGE_TOKEN: ${{ secrets.ROADMAP_BADGE_TOKEN }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GITHUB_TOKEN: ${{ github.token }}

      - name: Commit badge updates
        run: |
          if git diff --quiet -- .badges/releases; then
            echo "No badge changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .badges/releases
          git commit -m "Update release badge data"
          git push
