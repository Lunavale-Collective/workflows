name: Update release badges

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

permissions:
  contents: write

jobs:
  update-release-badges:
    runs-on: ubuntu-latest

    steps:
      - name: Check out badge repo
        uses: actions/checkout@v4

      - name: Check roadmap deploy key
        run: |
          if [ -z "$ROADMAP_DEPLOY_KEY" ]; then
            echo "::error::ROADMAP_DEPLOY_KEY is required to read the private scripts-roadmap repo over SSH."
            exit 1
          fi
        env:
          ROADMAP_DEPLOY_KEY: ${{ secrets.ROADMAP_DEPLOY_KEY }}

      - name: Check out roadmap repo
        uses: actions/checkout@v4
        with:
          repository: Lunavale-Collective/scripts-roadmap
          ref: main
          path: roadmap-source
          ssh-key: ${{ secrets.ROADMAP_DEPLOY_KEY }}
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Generate release badge JSON
        run: python3 scripts/update_release_badges.py
        env:
          ROADMAP_BADGE_TOKEN: ${{ secrets.ROADMAP_BADGE_TOKEN }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GITHUB_TOKEN: ${{ github.token }}
          ROADMAP_LOCAL_ROOT: roadmap-source

      - name: Commit badge updates
        run: |
          if [ -z "$(git status --porcelain -- .badges/releases .badges/roadmap .badges/workflows)" ]; then
            echo "No badge changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .badges/releases .badges/roadmap .badges/workflows
          git commit -m "Update badge data"
          git push
