name: Run Roadmap Planner

on:
  workflow_dispatch:
  schedule:
    # Every six hours.
    - cron: "0 */6 * * *"

permissions:
  contents: write

concurrency:
  group: workflows-badge-writes
  cancel-in-progress: false

jobs:
  run-roadmap-planner:
    runs-on: ubuntu-latest

    steps:
      - name: Check out workflows repo
        uses: actions/checkout@v4

      - name: Check required secrets
        run: |
          if [ -z "$ROADMAP_DEPLOY_KEY" ]; then
            echo "::error::ROADMAP_DEPLOY_KEY is required to check out scripts-roadmap over SSH."
            exit 1
          fi

          if [ -z "$ROADMAP_SYNC_KEY" ]; then
            echo "::error::ROADMAP_SYNC_KEY is required for issue_planner.py GitHub issue and Project sync."
            exit 1
          fi
        env:
          ROADMAP_DEPLOY_KEY: ${{ secrets.ROADMAP_DEPLOY_KEY }}
          ROADMAP_SYNC_KEY: ${{ secrets.ROADMAP_SYNC_KEY }}

      - name: Check out roadmap repo
        uses: actions/checkout@v4
        with:
          repository: Lunavale-Collective/scripts-roadmap
          ref: main
          path: scripts-roadmap
          ssh-key: ${{ secrets.ROADMAP_DEPLOY_KEY }}
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Configure roadmap git identity
        working-directory: scripts-roadmap
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Run planner self-test
        working-directory: scripts-roadmap
        run: PYTHONDONTWRITEBYTECODE=1 python3 issue_planner.py --self-test

      - name: Refuse stale roadmap YAML base
        working-directory: scripts-roadmap
        run: |
          git fetch origin main
          local_head="$(git rev-parse HEAD)"
          remote_head="$(git rev-parse origin/main)"

          if [ "$local_head" = "$remote_head" ]; then
            echo "Roadmap checkout is current."
            exit 0
          fi

          changed_roadmap_files="$(git diff --name-only "$local_head" "$remote_head" -- '*.yml' '*.yaml' roadmap.md)"
          if [ -n "$changed_roadmap_files" ]; then
            echo "::error::scripts-roadmap/main changed YAML/data after checkout. Re-run from the latest main instead of merging generated planner data."
            printf '%s\n' "$changed_roadmap_files"
            exit 1
          fi

          echo "Remote changed outside roadmap data; fast-forwarding without a merge commit."
          git merge --ff-only origin/main

      - name: Run full roadmap planner sync
        working-directory: scripts-roadmap
        run: PYTHONDONTWRITEBYTECODE=1 python3 issue_planner.py --full-run
        env:
          GH_TOKEN: ${{ secrets.ROADMAP_SYNC_KEY }}

      - name: Generate roadmap status badge JSON
        run: |
          python3 scripts/write_workflow_status_badge.py \
            --output .badges/workflows/roadmap-updated.json \
            --label "Run Roadmap Planner" \
            --color "0969da"

      - name: Commit roadmap status badge
        run: |
          if [ -z "$(git status --porcelain -- .badges/workflows/roadmap-updated.json)" ]; then
            echo "No roadmap status badge changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .badges/workflows/roadmap-updated.json
          git commit -m "Update roadmap status badge"

          for attempt in 1 2 3; do
            git fetch origin main
            git rebase origin/main
            if git push; then
              exit 0
            fi
            echo "Push failed on attempt ${attempt}; retrying after a short delay."
            sleep 5
          done

          echo "::error::Failed to push roadmap status badge after retries."
          exit 1
